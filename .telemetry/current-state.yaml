# SAGO AI — Current Tracking State
# Audited: 2026-06-09
# Method: automated codebase scan (4 parallel audits across frontend, backend lambdas, core modules)

meta:
  product: SAGO AI
  audit_date: "2026-06-09"
  coverage:
    - "proj/src/ — 54 JS/JSX React dashboard files"
    - "lambdas/notify/handler.py"
    - "lambdas/alerts/handler.py"
    - "lambdas/batch/handler.py"
    - "lambdas/ai/handler.py"
    - "lambdas/ack/handler.py"
    - "core/ — 10 Python modules (notifier, llm, risk_score, rule_matcher, rule_enrichment, weather, safety_visuals, recipients, alert_state, media)"
    - "proj/package.json"
    - "proj/index.html"
  tools_found:
    - none

summary:
  verdict: "no-tracking"
  tracked_events_count: 0
  untracked_flows:
    - "대시보드 모드 전환 (근로자 사고 / 고객 사고 / 알림 관리)"
    - "탭 네비게이션 (14개 근로자 탭 + 2개 알림 탭)"
    - "연도 필터 전환 (전체 / 2024 / 2025 / 2026)"
    - "역할 선택 및 해제 (경영진 / 영업부문장 / 팀장 / 파트장 / 안전보건팀)"
    - "알림 발송 (매장 검색 → 선택 → 발송 → 결과 확인)"
    - "알림 현황 조회 (날짜 선택 → 조회 → 상세 보기)"
    - "AI 안전가이드 생성 (매장 선택 → 가이드 생성 요청)"
    - "데이터 업로드 (사고 DB / 매장 DB / 근로자 DB Excel 파일)"
    - "인쇄 (window.print())"
    - "에러 복구 (TabErrorBoundary 다시 시도)"
  notes: >
    Zero analytics or product telemetry instrumentation exists anywhere in SAGO AI — no third-party
    SDKs (GA4, GTM, Mixpanel, Amplitude, Segment, PostHog, Hotjar), no custom event helpers, no
    dataLayer pushes, and no CloudWatch custom metrics. The only logging found is three
    print()-based audit lines in Lambda handlers (notify, batch, ack) that flow to CloudWatch Logs
    as unstructured text; these capture operational delivery facts (store, recipient count, channel,
    ack status) but are not product analytics events and are not queryable by dimension or funnel.
    All four frontend network calls are internal operational API calls (notify POST, alerts GET ×2,
    AI Lambda POST) — none carry behavior telemetry. As a result, there is currently no answer to
    any product usage question: which tabs are used, whether AI guide generation succeeds or
    frustrates users, how often alerts actually get sent vs abandoned, or whether role filtering
    narrows the experience as intended.

existing_tracking:
  # Lambda CloudWatch audit logs (operational, NOT product analytics)
  - file: "lambdas/notify/handler.py"
    tool: "print → CloudWatch Logs"
    event_name: "[notify][audit] send scope"
    properties: [store_code, dept, team, recipient_count, resolved_via]
    notes: "운영 감사 로그. 분석 SDK 아님 — CloudWatch 비정형 텍스트로 저장, 퍼널/코호트 분석 불가."
  - file: "lambdas/batch/handler.py"
    tool: "print → CloudWatch Logs"
    event_name: "[batch][audit] send scope"
    properties: [store_code, recipient_count, channel, severity]
    notes: "배치 트리거당 1회. 운영 모니터링 용도."
  - file: "lambdas/ack/handler.py"
    tool: "print → CloudWatch Logs"
    event_name: "[ack][audit] acknowledgement"
    properties: [store_code, actor_redacted, status]
    notes: "카카오 수신 확인 콜백. actor UUID는 앞 4자만 노출."

