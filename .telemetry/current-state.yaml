recommendations:
  priority_events:
    - name: "alert_send_submitted"
      trigger: "발송 버튼 클릭 직후, notify API POST 직전"
      why: >
        알림 발송은 SAGO AI의 핵심 운영 액션이다. 이 이벤트가 없으면 발송 시도 횟수,
        대상 매장 수, 채널(kakao vs mock), 포기율(토큰 미입력 등)을 전혀 알 수 없다.
        매장 선택 수(store_count), 채널, 날짜를 속성으로 포함해야 한다.

    - name: "alert_send_result"
      trigger: "notify API 응답 수신 후 (성공 또는 실패)"
      why: >
        발송 시도 대비 실제 성공률을 측정하는 유일한 수단이다. HTTP 상태, 수신자 수,
        에러 메시지를 속성으로 포함하면 Lambda 오류 패턴과 토큰 만료 빈도를 파악할 수 있다.

    - name: "ai_guide_requested"
      trigger: "AI 가이드 생성 버튼 클릭 → AI Lambda POST 직전"
      why: >
        AI 기능 사용률과 어느 매장·부서에서 가이드 생성 요청이 집중되는지를 보여준다.
        store_code, dept, team을 속성으로 포함하면 고위험 매장의 실제 활용 여부를 검증할 수 있다.

    - name: "ai_guide_result"
      trigger: "AI Lambda 응답 수신 후 (성공 또는 에러)"
      why: >
        AI 가이드 생성 성공률과 지연 시간(latency_ms)을 측정한다. 실패율이 높으면
        사용자 이탈로 이어지므로 Bedrock 호출 안정성을 선제적으로 모니터링할 수 있다.

    - name: "tab_viewed"
      trigger: "탭 버튼 클릭으로 탭이 마운트될 때"
      why: >
        14개 분석 탭 중 실제로 사용되는 탭과 사장된 탭을 구분하는 가장 기본적인 지표다.
        tab_id, role_filter, dashboard_mode, year_filter를 속성으로 포함하면
        역할별 사용 패턴과 어느 탭이 우선 개선 대상인지 데이터로 결정할 수 있다.
