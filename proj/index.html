<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#D70011" />
    <title>매장 안전사고현황 대시보드 · ㈜아성다이소 안전보건팀</title>
    <meta name="description" content="㈜아성다이소 매장 안전사고 현황을 실시간으로 모니터링하고 AI 안전 가이드를 제공합니다." />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="180x180" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />

    <!-- Open Graph (Facebook, KakaoTalk, Slack, etc) -->
    <!-- og:image / og:url 은 절대 URL 필수 (카카오톡 등 크롤러가 상대경로 미인식) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://daiso-safety-v1-frontend.s3-website.ap-northeast-2.amazonaws.com/" />
    <meta property="og:title" content="매장 안전사고현황 대시보드" />
    <meta property="og:description" content="㈜아성다이소 · 안전보건팀 · 매장 안전사고 모니터링 및 AI 안전 가이드" />
    <meta property="og:image" content="http://daiso-safety-v1-frontend.s3-website.ap-northeast-2.amazonaws.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="매장 안전사고현황 대시보드 / ㈜아성다이소 안전보건팀" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:site_name" content="㈜아성다이소 안전보건" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="매장 안전사고현황 대시보드" />
    <meta name="twitter:description" content="㈜아성다이소 · 안전보건팀 · 매장 안전사고 모니터링" />
    <meta name="twitter:image" content="http://daiso-safety-v1-frontend.s3-website.ap-northeast-2.amazonaws.com/og-image.png" />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" />

    <!-- Kakao Maps SDK — 매장 위험지도(StoreRiskMap)용 -->
    <!-- appkey 는 .env 의 VITE_KAKAO_JS_KEY (JavaScript 키). autoload=false: 컴포넌트가 kakao.maps.load() 직접 호출 -->
    <link rel="preconnect" href="https://dapi.kakao.com" />
    <script defer
      src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=%VITE_KAKAO_JS_KEY%&autoload=false"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
