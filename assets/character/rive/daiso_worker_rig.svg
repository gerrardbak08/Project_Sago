<!--
  daiso_worker_rig.svg — Rive 리깅용 레이어 분해본
  ─────────────────────────────────────────────────
  · 원본: daiso-worker-faces.html (사용자 제공 디자인)
  · 각 신체 부위를 명명된 <g id="..."> 로 분리 → Rive Import 시 그대로 본(bone)에 바인딩
  · 색상: 빨강 셔츠 #E84B4B / 파랑 앞치마 #2B5CB8 / 진곤색 바지 #2D3340
  · 표정은 #face-* 그룹 중 하나만 노출(나머지는 런타임/상태머신에서 토글)
  · 리깅 권장 본 계층은 RIG_GUIDE.md 참고

  좌표계: viewBox 0 0 120 180 (원본 유지)
  피벗(관절) 참고 좌표:
    목         (60,52)    어깨L (41,68) 어깨R (79,68)
    팔꿈치L    (38,90)    팔꿈치R (82,90)
    골반       (60,116)   고관절L (52,118) 고관절R (68,118)
    무릎L      (49,138)   무릎R (71,138)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="240" height="360">
  <g stroke="#1A1A1A" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">

