        <ellipse cx="60" cy="46" rx="3" ry="3.5" fill="#fff" stroke="#1A1A1A" stroke-width="1.6"/>
      </g>
      <!-- 아픔: 부상·통증 (display:none) -->
      <g id="face_pain" style="display:none">
