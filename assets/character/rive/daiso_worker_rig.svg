        <path d="M64,36 L70,39 M64,39 L70,36" stroke="#1A1A1A" stroke-width="1.6"/>
        <path d="M54,46 Q57,42 60,46 Q63,42 66,46" fill="none" stroke="#1A1A1A" stroke-width="1.7"/>
      </g>
