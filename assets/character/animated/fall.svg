  <g><rect x="54" y="50" width="12" height="14" rx="3" fill="#F2C9A0"/><circle cx="60" cy="36" r="19" fill="#F2C9A0"/><path d="M49,31 Q53,29 57,31" fill="none" stroke="#1A1A1A" stroke-width="1.4"/><path d="M63,31 Q67,29 71,31" fill="none" stroke="#1A1A1A" stroke-width="1.4"/><circle cx="53" cy="38" r="3" fill="#fff" stroke="#1A1A1A" stroke-width="1.4"/><circle cx="53" cy="38" r="1.2" fill="#1A1A1A" stroke="none"/><circle cx="67" cy="38" r="3" fill="#fff" stroke="#1A1A1A" stroke-width="1.4"/><circle cx="67" cy="38" r="1.2" fill="#1A1A1A" stroke="none"/><ellipse cx="60" cy="46" rx="3" ry="3.5" fill="#fff" stroke="#1A1A1A" stroke-width="1.6"/><path d="M41,40 C40,20 51,14 60,14 C69,14 80,20 79,40 C75,30 68,27 60,28 C52,27 45,30 41,40 Z" fill="#3A3A3A"/></g>
</g>
