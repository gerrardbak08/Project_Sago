name: Build + Deploy

# 트리거:
#  1) main 에 빌드 관련 파일 push → 빌드 + S3 배포
#  2) 수동 실행 (workflow_dispatch)
#
# 데이터(workerData.js / snapshots.js / approvalData.js)는 DB/*.xlsx 로부터
# **로컬에서** 재생성·커밋한다. DB/ 는 개인정보 때문에 gitignore 되어 CI 러너에는
# 없으므로, CI 는 커밋된 데이터를 그대로 빌드·배포만 한다. (npm run data 안 함)
on:
  push:
    branches: [main]
    paths:
      - 'proj/src/**'
      - 'proj/scripts/**'
      - 'proj/index.html'
      - 'proj/package.json'
      - 'proj/vite.config.js'
      - '.github/workflows/regenerate-and-deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write     # AWS OIDC 인증용
    env:
      CF_DIST: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: proj/package-lock.json

      - name: Install dependencies
        working-directory: proj
        env:
          NODE_ENV: development
        run: npm ci --include=dev

      - name: Build
        working-directory: proj
        env:
          NODE_ENV: development
        run: npm run build

      # AWS 배포 — OIDC 권장 (Access Key 노출 방지).
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Sync to S3
        run: |
          aws s3 sync proj/dist/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=300" \
            --exclude "*.html" --exclude "og-image.png" --exclude "favicon*.png"
          # HTML/OG/favicon은 짧은 cache (변경 자주 됨)
          aws s3 cp proj/dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache, max-age=0"
          aws s3 cp proj/dist/og-image.png s3://${{ secrets.S3_BUCKET }}/og-image.png \
            --cache-control "public, max-age=3600"
          aws s3 cp proj/dist/favicon.png s3://${{ secrets.S3_BUCKET }}/favicon.png \
            --cache-control "public, max-age=86400"

      # CloudFront 사용 시 cache invalidation (선택)
      # secrets 는 if 조건에서 직접 못 쓰므로 job env(CF_DIST)로 옮겨 평가한다.
      - name: Invalidate CloudFront (optional)
        if: ${{ env.CF_DIST != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DIST" \
            --paths "/index.html" "/og-image.png" "/favicon.png"
