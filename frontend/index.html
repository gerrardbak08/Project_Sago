<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다이소 매장 안전사고 예방 AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 헤더 -->
  <header class="header">
    <h1>🏪 다이소 매장 안전사고 예방 AI</h1>
  </header>

  <!-- 탭 네비게이션 -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="monitoring">📊 알림 발송 현황</button>
    <button class="tab-btn" data-tab="manual">✏️ 수동 알림 생성</button>
  </nav>

  <!-- 탭 1: 알림 발송 현황 모니터링 -->
  <section id="tab-monitoring" class="tab-content active">
    <div class="controls">
      <label for="monitor-date">날짜 선택</label>
      <input type="date" id="monitor-date">
      <button id="btn-load-batch" class="btn btn-primary">조회</button>
    </div>

    <!-- 로딩 -->
    <div id="monitor-loading" class="loading hidden">
      <div class="spinner"></div>
      <span>데이터를 불러오는 중...</span>
    </div>

    <!-- 빈 상태 -->
    <div id="monitor-empty" class="empty-state">
      <p>📋 날짜를 선택하고 조회 버튼을 눌러주세요.</p>
    </div>

    <!-- 에러 -->
    <div id="monitor-error" class="error-state hidden"></div>

    <!-- 결과 영역 -->
    <div id="monitor-result" class="hidden">
      <!-- 요약 카드 -->
      <div class="summary-cards">
        <div class="card">
          <div class="card-label">총 발송 수</div>
          <div class="card-value" id="card-total">0</div>
        </div>
        <div class="card">
          <div class="card-label">성공</div>
          <div class="card-value card-success" id="card-success">0</div>
        </div>
        <div class="card">
          <div class="card-label">실패</div>
          <div class="card-value card-fail" id="card-failed">0</div>
        </div>
        <div class="card">
          <div class="card-label">이메일 발송</div>
          <div class="card-value card-email" id="card-email">0</div>
        </div>
      </div>

      <!-- 매장별 결과 테이블 -->
      <div class="table-wrap">
        <table class="result-table">
          <thead>
            <tr>
              <th>매장코드</th>
              <th>매장명</th>
              <th>상태</th>
              <th>고객 위험도</th>
              <th>직원 위험도</th>
              <th>이메일</th>
            </tr>
          </thead>
          <tbody id="batch-tbody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- 탭 2: 수동 알림 생성 -->
  <section id="tab-manual" class="tab-content">
    <div class="controls">
      <div class="search-wrap">
        <label for="store-search">매장 검색</label>
        <input type="text" id="store-search" placeholder="매장명 또는 코드 입력" autocomplete="off">
        <ul id="store-dropdown" class="dropdown hidden"></ul>
      </div>
      <div>
        <label for="manual-date">날짜 선택</label>
        <input type="date" id="manual-date">
      </div>
      <button id="btn-simulate" class="btn btn-primary" disabled>생성</button>
    </div>

    <!-- 선택된 매장 표시 -->
    <div id="selected-store" class="selected-store hidden"></div>

    <!-- 로딩 -->
    <div id="manual-loading" class="loading hidden">
      <div class="spinner"></div>
      <span>안전 가이드를 생성하는 중...</span>
    </div>

    <!-- 빈 상태 -->
    <div id="manual-empty" class="empty-state">
      <p>🔍 매장을 검색하고 날짜를 선택한 후 생성 버튼을 눌러주세요.</p>
    </div>

    <!-- 에러 -->
    <div id="manual-error" class="error-state hidden"></div>

    <!-- 결과 영역 -->
    <div id="manual-result" class="hidden">
      <div class="sim-header">
        <h2 id="sim-store-name"></h2>
        <span id="sim-region" class="region-tag"></span>
        <span id="sim-date" class="date-tag"></span>
      </div>

      <!-- CUST 섹션 -->
      <div class="guide-section">
        <h3>👥 고객 안전 (CUST)</h3>
        <div id="guide-cust" class="guide-body"></div>
      </div>

      <!-- EMP 섹션 -->
      <div class="guide-section">
        <h3>🧑‍🔧 직원 안전 (EMP)</h3>
        <div id="guide-emp" class="guide-body"></div>
      </div>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
